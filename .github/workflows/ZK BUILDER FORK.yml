name: ROM Comparison Tool

on:
  workflow_dispatch:
    inputs:
      rom_url_1:
        description: 'Đường dẫn tải ROM 1 (ROM gốc / cũ)'
        required: true
        type: string
      rom_url_2:
        description: 'Đường dẫn tải ROM 2 (ROM mới)'
        required: true
        type: string
      partitions:
        description: 'Các phân vùng cần so sánh (cách nhau bằng dấu phẩy)'
        required: false
        default: 'system,vendor,product,system_ext'
        type: string

jobs:
  compare:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Builder (compare branch)
        uses: actions/checkout@v4
        with:
          ref: compare
          path: builder

      - name: Checkout ZK_AUTO_BUILD (hzz branch)
        uses: actions/checkout@v4
        with:
          repository: zuri1503/ZK_AUTO_BUILD
          ref: hzz
          path: zk_auto_build
          ssh-key: ${{ secrets.PRIVATE_REPO_KEY }}

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y aria2 unzip python3 liblz4-tool zip jq android-sdk-libsparse-utils

      - name: Set up tools permissions
        run: |
          chmod +x zk_auto_build/tools/payload
          chmod +x zk_auto_build/tools/extract.erofs

      - name: Download ROMs
        run: |
          mkdir -p rom1_temp rom2_temp
          echo "Downloading ROM 1..."
          aria2c -s 16 -x 16 -o rom1_temp/rom1.zip "${{ inputs.rom_url_1 }}" &
          echo "Downloading ROM 2..."
          aria2c -s 16 -x 16 -o rom2_temp/rom2.zip "${{ inputs.rom_url_2 }}" &
          wait
          echo "ROMs downloaded successfully."

      - name: Initialize Comparison Report
        run: |
          # Summary report
          echo "# Báo cáo so sánh ROM (ROM Comparison Report)" > compare_report.md
          echo "" >> compare_report.md
          echo "- **Thời gian thực hiện (UTC)**: $(date -u)" >> compare_report.md
          echo "- **ROM 1 (Cũ)**: [Link](${{ inputs.rom_url_1 }})" >> compare_report.md
          echo "- **ROM 2 (Mới)**: [Link](${{ inputs.rom_url_2 }})" >> compare_report.md
          echo "- **Phân vùng kiểm tra**: \`${{ inputs.partitions }}\`" >> compare_report.md
          echo "" >> compare_report.md
          echo "---" >> compare_report.md
          echo "" >> compare_report.md

          # Full report
          echo "# Báo cáo so sánh ROM Đầy đủ (Full ROM Comparison Report)" > compare_report_full.md
          echo "" >> compare_report_full.md
          echo "- **Thời gian thực hiện (UTC)**: $(date -u)" >> compare_report_full.md
          echo "- **ROM 1 (Cũ)**: [Link](${{ inputs.rom_url_1 }})" >> compare_report_full.md
          echo "- **ROM 2 (Mới)**: [Link](${{ inputs.rom_url_2 }})" >> compare_report_full.md
          echo "- **Phân vùng kiểm tra**: \`${{ inputs.partitions }}\`" >> compare_report_full.md
          echo "" >> compare_report_full.md
          echo "---" >> compare_report_full.md
          echo "" >> compare_report_full.md

      - name: Compare Partitions Sequentially
        run: |
          mkdir -p rom_diff_out
          IFS=',' read -r -a part_array <<< "${{ inputs.partitions }}"
          for part in "${part_array[@]}"; do
            part=$(echo "$part" | xargs) # trim whitespace
            if [ -z "$part" ]; then continue; fi
            
            echo "=================================================="
            echo "Processing Partition: $part"
            echo "=================================================="
            
            # Create directories
            mkdir -p rom1_temp/images rom2_temp/images
            mkdir -p rom1_temp/extracted rom2_temp/extracted
            
            # Extract partition img using smart python script
            echo "Extracting $part.img from ROM 1..."
            if python3 builder/extract_partition.py --zip rom1_temp/rom1.zip --partition "$part" --output "rom1_temp/images/${part}.img" --tools zk_auto_build/tools; then
              echo "Extracting $part.img from ROM 2..."
              if python3 builder/extract_partition.py --zip rom2_temp/rom2.zip --partition "$part" --output "rom2_temp/images/${part}.img" --tools zk_auto_build/tools; then
                
                # Unpack erofs images
                echo "Unpacking ROM 1 $part.img..."
                if [ -f "rom1_temp/images/${part}.img" ]; then
                  ./zk_auto_build/tools/extract.erofs -x -i "rom1_temp/images/${part}.img" -o "rom1_temp/extracted" > /dev/null 2>&1 || echo "Failed to unpack ROM 1 ${part}.img"
                  rm -f "rom1_temp/images/${part}.img"
                fi
                
                echo "Unpacking ROM 2 $part.img..."
                if [ -f "rom2_temp/images/${part}.img" ]; then
                  ./zk_auto_build/tools/extract.erofs -x -i "rom2_temp/images/${part}.img" -o "rom2_temp/extracted" > /dev/null 2>&1 || echo "Failed to unpack ROM 2 ${part}.img"
                  rm -f "rom2_temp/images/${part}.img"
                fi
                
                # Compare directories
                if [ -d "rom1_temp/extracted/${part}" ] && [ -d "rom2_temp/extracted/${part}" ]; then
                  python3 builder/compare_roms.py \
                    --dir1 "rom1_temp/extracted/${part}" \
                    --dir2 "rom2_temp/extracted/${part}" \
                    --partition "$part" \
                    --output compare_report.md \
                    --output-full compare_report_full.md \
                    --diff-out rom_diff_out
                else
                  echo "## Phân vùng / Partition: \`${part^^}\`" >> compare_report.md
                  echo "## Phân vùng / Partition: \`${part^^}\`" >> compare_report_full.md
                  echo "❌ Không thể giải nén cấu trúc thư mục của một trong hai ROM." >> compare_report.md
                  echo "❌ Không thể giải nén cấu trúc thư mục của một trong hai ROM." >> compare_report_full.md
                  echo "---" >> compare_report.md
                  echo "---" >> compare_report.md
                fi
                
              else
                echo "## Phân vùng / Partition: \`${part^^}\`" >> compare_report.md
                echo "## Phân vùng / Partition: \`${part^^}\`" >> compare_report_full.md
                echo "⚠️ Phân vùng không tồn tại hoặc không thể trích xuất trong ROM 2." >> compare_report.md
                echo "⚠️ Phân vùng không tồn tại hoặc không thể trích xuất trong ROM 2." >> compare_report.md
                echo "---" >> compare_report.md
                echo "---" >> compare_report.md
              fi
            else
              echo "## Phân vùng / Partition: \`${part^^}\`" >> compare_report.md
              echo "## Phân vùng / Partition: \`${part^^}\`" >> compare_report_full.md
              echo "⚠️ Phân vùng không tồn tại hoặc không thể trích xuất trong ROM 1." >> compare_report.md
              echo "⚠️ Phân vùng không tồn tại hoặc không thể trích xuất trong ROM 1." >> compare_report.md
              echo "---" >> compare_report.md
              echo "---" >> compare_report.md
            fi
            
            # Clean up partition-specific data immediately to save disk space
            echo "Cleaning up files for partition: $part..."
            rm -rf rom1_temp/images rom2_temp/images
            rm -rf rom1_temp/extracted rom2_temp/extracted
          done

      - name: Package diff files
        run: |
          if [ -d "rom_diff_out" ] && [ "$(ls -A rom_diff_out)" ]; then
            echo "📦 Packaging different files..."
            (cd rom_diff_out && zip -r ../rom_diff.zip .)
            echo "✅ Created rom_diff.zip"
          else
            echo "ℹ️ No different files found to package."
          fi

      - name: Upload Diff Zip & Full Report to Gofile / Pixeldrain
        run: |
          GOFILE_LINK=""
          PIXEL_LINK=""
          GOFILE_REPORT_LINK=""
          PIXEL_REPORT_LINK=""

          if [ -f "rom_diff.zip" ]; then
            echo "📤 Uploading diff package to storage services..."
            
            # Upload to Pixeldrain
            echo "📤 Uploading diff zip to Pixeldrain..."
            if [ -n "${{ secrets.PIXELDRAIN_API_KEY }}" ]; then
              PD_RES=$(curl -sf -u ":${{ secrets.PIXELDRAIN_API_KEY }}" -F "file=@rom_diff.zip" "https://pixeldrain.com/api/file")
            else
              PD_RES=$(curl -sf -F "file=@rom_diff.zip" "https://pixeldrain.com/api/file")
            fi
            PD_ID=$(echo "$PD_RES" | jq -r '.id // empty')
            if [ -n "$PD_ID" ]; then
              PIXEL_LINK="https://pixeldrain.com/u/${PD_ID}"
              echo "✅ Pixeldrain: $PIXEL_LINK"
            else
              echo "⚠️ Pixeldrain upload failed: $PD_RES"
            fi
            
            # Upload to Gofile
            echo "📤 Uploading diff zip to Gofile..."
            SERVER=$(curl -sf "https://api.gofile.io/servers" | jq -r '.data.servers[0].name // empty')
            if [ -n "$SERVER" ] && [ "$SERVER" != "null" ]; then
              if [ -n "${{ secrets.GOFILE_API_KEY }}" ]; then
                GF_RES=$(curl -sf -H "Authorization: Bearer ${{ secrets.GOFILE_API_KEY }}" -F "file=@rom_diff.zip" "https://${SERVER}.gofile.io/contents/uploadfile")
              else
                GF_RES=$(curl -sf -F "file=@rom_diff.zip" "https://${SERVER}.gofile.io/contents/uploadfile")
              fi
              GF_LINK=$(echo "$GF_RES" | jq -r '.data.downloadPage // empty')
              if [ -n "$GF_LINK" ]; then
                GOFILE_LINK="$GF_LINK"
                echo "✅ Gofile: $GOFILE_LINK"
              else
                echo "⚠️ Gofile upload failed: $GF_RES"
              fi
            fi
          fi

          if [ -f "compare_report_full.md" ]; then
            echo "📤 Uploading full comparison report to storage services..."
            
            # Upload report to Pixeldrain
            echo "📤 Uploading report to Pixeldrain..."
            if [ -n "${{ secrets.PIXELDRAIN_API_KEY }}" ]; then
              PD_RES=$(curl -sf -u ":${{ secrets.PIXELDRAIN_API_KEY }}" -F "file=@compare_report_full.md" "https://pixeldrain.com/api/file")
            else
              PD_RES=$(curl -sf -F "file=@compare_report_full.md" "https://pixeldrain.com/api/file")
            fi
            PD_ID=$(echo "$PD_RES" | jq -r '.id // empty')
            if [ -n "$PD_ID" ]; then
              PIXEL_REPORT_LINK="https://pixeldrain.com/u/${PD_ID}"
              echo "✅ Pixeldrain Full Report: $PIXEL_REPORT_LINK"
            else
              echo "⚠️ Pixeldrain report upload failed: $PD_RES"
            fi
            
            # Upload report to Gofile
            echo "📤 Uploading report to Gofile..."
            SERVER=$(curl -sf "https://api.gofile.io/servers" | jq -r '.data.servers[0].name // empty')
            if [ -n "$SERVER" ] && [ "$SERVER" != "null" ]; then
              if [ -n "${{ secrets.GOFILE_API_KEY }}" ]; then
                GF_RES=$(curl -sf -H "Authorization: Bearer ${{ secrets.GOFILE_API_KEY }}" -F "file=@compare_report_full.md" "https://${SERVER}.gofile.io/contents/uploadfile")
              else
                GF_RES=$(curl -sf -F "file=@compare_report_full.md" "https://${SERVER}.gofile.io/contents/uploadfile")
              fi
              GF_LINK=$(echo "$GF_RES" | jq -r '.data.downloadPage // empty')
              if [ -n "$GF_LINK" ]; then
                GOFILE_REPORT_LINK="$GF_LINK"
                echo "✅ Gofile Full Report: $GOFILE_REPORT_LINK"
              else
                echo "⚠️ Gofile report upload failed: $GF_RES"
              fi
            fi
          fi

          # Append download/view links to report summary
          echo "### 📂 Tải xuống & Xem báo cáo" > temp_links.md
          if [ -n "$PIXEL_LINK" ] || [ -n "$GOFILE_LINK" ]; then
            echo "#### 📦 Các file khác biệt (ROM Diff Package)" >> temp_links.md
            [ -n "$PIXEL_LINK" ] && echo "- **Pixeldrain**: [Tải xuống]($PIXEL_LINK)" >> temp_links.md
            [ -n "$GOFILE_LINK" ] && echo "- **Gofile**: [Tải xuống]($GOFILE_LINK)" >> temp_links.md
          fi
          if [ -n "$PIXEL_REPORT_LINK" ] || [ -n "$GOFILE_REPORT_LINK" ]; then
            echo "#### 📄 Báo cáo so sánh đầy đủ (Full Report)" >> temp_links.md
            [ -n "$PIXEL_REPORT_LINK" ] && echo "- **Pixeldrain**: [Xem/Tải xuống]($PIXEL_REPORT_LINK)" >> temp_links.md
            [ -n "$GOFILE_REPORT_LINK" ] && echo "- **Gofile**: [Xem/Tải xuống]($GOFILE_REPORT_LINK)" >> temp_links.md
          fi
          echo "" >> temp_links.md
          echo "---" >> temp_links.md
          echo "" >> temp_links.md
          
          if [ -s temp_links.md ]; then
            cat temp_links.md compare_report.md > new_report.md
            mv -f new_report.md compare_report.md
          fi
          rm -f temp_links.md

      - name: Clean up remaining files
        run: |
          rm -rf rom1_temp rom2_temp rom_diff_out

      - name: Publish Summary
        run: |
          cat compare_report.md >> $GITHUB_STEP_SUMMARY

      - name: Upload Report Artifact
        uses: actions/upload-artifact@v4
        with:
          name: rom_comparison_report
          path: compare_report*.md
