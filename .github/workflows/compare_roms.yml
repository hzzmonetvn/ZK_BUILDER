name: ROM Comparison Tool

on:
  workflow_dispatch:
    inputs:
      rom_url_1:
        description: 'Đường dẫn tải ROM 1 (ROM gốc / cũ)'
        required: true
        type: string
      rom_url_2:
        description: 'Đường dẫn tải ROM 2 (ROM mới)'
        required: true
        type: string
      partitions:
        description: 'Các phân vùng cần so sánh (cách nhau bằng dấu phẩy)'
        required: false
        default: 'system,vendor,product,system_ext'
        type: string

jobs:
  compare:
    runs-on: ubuntu-latest

    steps:
      - name: Free Disk Space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: false
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: true

      - name: Checkout Builder (dev branch)
        uses: actions/checkout@v4
        with:
          ref: dev
          path: builder

      - name: Checkout ZK_AUTO_BUILD (hzz branch)
        uses: actions/checkout@v4
        with:
          repository: zuri1503/ZK_AUTO_BUILD
          ref: hzz
          path: zk_auto_build

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y aria2 unzip python3 liblz4-tool

      - name: Set up tools permissions
        run: |
          chmod +x zk_auto_build/tools/payload
          chmod +x zk_auto_build/tools/extract.erofs

      - name: Download ROMs
        run: |
          mkdir -p rom1_temp rom2_temp
          echo "Downloading ROM 1..."
          aria2c -s 16 -x 16 -o rom1_temp/rom1.zip "${{ inputs.rom_url_1 }}" &
          echo "Downloading ROM 2..."
          aria2c -s 16 -x 16 -o rom2_temp/rom2.zip "${{ inputs.rom_url_2 }}" &
          wait
          echo "ROMs downloaded successfully."

      - name: Extract payload.bin
        run: |
          echo "Extracting payload.bin from ROM 1..."
          unzip -j -q rom1_temp/rom1.zip payload.bin -d rom1_temp || echo "ROM 1 might not contain payload.bin directly or download failed"
          rm -f rom1_temp/rom1.zip
          
          echo "Extracting payload.bin from ROM 2..."
          unzip -j -q rom2_temp/rom2.zip payload.bin -d rom2_temp || echo "ROM 2 might not contain payload.bin directly or download failed"
          rm -f rom2_temp/rom2.zip

      - name: Initialize Comparison Report
        run: |
          echo "# Báo cáo so sánh ROM (ROM Comparison Report)" > compare_report.md
          echo "" >> compare_report.md
          echo "- **Thời gian thực hiện (UTC)**: $(date -u)" >> compare_report.md
          echo "- **ROM 1 (Cũ)**: [Link](${{ inputs.rom_url_1 }})" >> compare_report.md
          echo "- **ROM 2 (Mới)**: [Link](${{ inputs.rom_url_2 }})" >> compare_report.md
          echo "- **Phân vùng kiểm tra**: \`${{ inputs.partitions }}\`" >> compare_report.md
          echo "" >> compare_report.md
          echo "---" >> compare_report.md
          echo "" >> compare_report.md

      - name: Compare Partitions Sequentially
        run: |
          IFS=',' read -r -a part_array <<< "${{ inputs.partitions }}"
          for part in "${part_array[@]}"; do
            part=$(echo "$part" | xargs) # trim whitespace
            if [ -z "$part" ]; then continue; fi
            
            echo "=================================================="
            echo "Processing Partition: $part"
            echo "=================================================="
            
            # Create directories
            mkdir -p rom1_temp/images rom2_temp/images
            mkdir -p rom1_temp/extracted rom2_temp/extracted
            
            # Dump partition
            echo "Dumping $part from ROM 1 payload.bin..."
            if ./zk_auto_build/tools/payload -p "$part" -o rom1_temp/images rom1_temp/payload.bin; then
              echo "Dumping $part from ROM 2 payload.bin..."
              if ./zk_auto_build/tools/payload -p "$part" -o rom2_temp/images rom2_temp/payload.bin; then
                
                # Unpack erofs images
                echo "Unpacking ROM 1 $part.img..."
                if [ -f "rom1_temp/images/${part}.img" ]; then
                  ./zk_auto_build/tools/extract.erofs -x -i "rom1_temp/images/${part}.img" -o "rom1_temp/extracted" > /dev/null 2>&1 || echo "Failed to unpack ROM 1 ${part}.img"
                  rm -f "rom1_temp/images/${part}.img"
                fi
                
                echo "Unpacking ROM 2 $part.img..."
                if [ -f "rom2_temp/images/${part}.img" ]; then
                  ./zk_auto_build/tools/extract.erofs -x -i "rom2_temp/images/${part}.img" -o "rom2_temp/extracted" > /dev/null 2>&1 || echo "Failed to unpack ROM 2 ${part}.img"
                  rm -f "rom2_temp/images/${part}.img"
                fi
                
                # Compare directories
                if [ -d "rom1_temp/extracted/${part}" ] && [ -d "rom2_temp/extracted/${part}" ]; then
                  python3 builder/compare_roms.py \
                    --dir1 "rom1_temp/extracted/${part}" \
                    --dir2 "rom2_temp/extracted/${part}" \
                    --partition "$part" \
                    --output compare_report.md
                else
                  echo "## Phân vùng / Partition: \`${part^^}\`" >> compare_report.md
                  echo "❌ Không thể giải nén cấu trúc thư mục của một trong hai ROM." >> compare_report.md
                  echo "---" >> compare_report.md
                fi
                
              else
                echo "## Phân vùng / Partition: \`${part^^}\`" >> compare_report.md
                echo "⚠️ Phân vùng không tồn tại trong ROM 2." >> compare_report.md
                echo "---" >> compare_report.md
              fi
            else
              echo "## Phân vùng / Partition: \`${part^^}\`" >> compare_report.md
              echo "⚠️ Phân vùng không tồn tại trong ROM 1." >> compare_report.md
              echo "---" >> compare_report.md
            fi
            
            # Clean up partition-specific data immediately to save disk space
            echo "Cleaning up files for partition: $part..."
            rm -rf rom1_temp/images rom2_temp/images
            rm -rf rom1_temp/extracted rom2_temp/extracted
          done

      - name: Clean up remaining files
        run: |
          rm -rf rom1_temp rom2_temp

      - name: Publish Summary
        run: |
          cat compare_report.md >> $GITHUB_STEP_SUMMARY

      - name: Upload Report
        uses: actions/upload-artifact@v4
        with:
          name: rom_comparison_report
          path: compare_report.md
