name: ZK BUILDER STOCK (fork)

permissions:
  contents: write

on:
  workflow_dispatch:
    inputs:
      URL:
        description: "OTA ROM URL"
        required: true
      URL2:
        description: "FASTBOOT ROM URL (opt)"
        required: false
      UPLOAD_SF:
        type: boolean
        default: false
      UPLOAD_GDRIVE:
        type: boolean
        default: false
      UPLOAD_GOFILE:
        type: boolean
        default: false
      UPLOAD_PIXELDRAIN:
        type: boolean
        default: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup
        run: |
          sudo apt update
          sudo apt install -y aria2 jq curl rsync python3 python3-pip
          curl -fsSL https://rclone.org/install.sh | sudo bash

      - name: Init
        run: |
          DATE=$(date +"%y%m%d")
          ROM_URL="${{ github.event.inputs.URL }}"
          ROM_NAME=$(basename "${ROM_URL%%\?*}")
          ZK_NAME="ZKOS_${DATE}"

          echo "ZK_NAME=$ZK_NAME" >> $GITHUB_ENV

      - name: Download ROM
        run: |
          mkdir ROM && cd ROM
          aria2c -x16 -s16 -o "${ZK_NAME}.zip" "${{ github.event.inputs.URL }}"

      - name: Clone builder
        run: |
          git clone --depth=1 https://github.com/zuri1503/ZK_AUTO_BUILD.git builder
          mv ROM/*.zip builder/ROM/

      - name: Build
        id: build_step
        run: |
          cd builder

          set +e
          bash build.sh "$GITHUB_ENV" "$PWD" "$ZK_NAME" "0"
          BUILD_EXIT=$?
          set -e

          source "$GITHUB_ENV" || true

          if [ $BUILD_EXIT -ne 0 ]; then
            echo "BUILD_STATUS=failed" >> $GITHUB_ENV
            exit 1
          fi

          if [ -z "$ROM_OUTPUT" ] || [ ! -f "$ROM_OUTPUT" ]; then
            echo "BUILD_STATUS=failed" >> $GITHUB_ENV
            exit 1
          fi

          echo "BUILD_STATUS=success" >> $GITHUB_ENV
          echo "ROM_OUTPUT=$ROM_OUTPUT" >> $GITHUB_ENV

      - name: Upload Pixeldrain
        if: ${{ github.event.inputs.UPLOAD_PIXELDRAIN == 'true' }}
        continue-on-error: true
        run: |
          RES=$(curl -sf -u ":${{ secrets.PIXELDRAIN_API_KEY }}" \
            -F "file=@${ROM_OUTPUT}" \
            "https://pixeldrain.com/api/file")

          ID=$(echo "$RES" | jq -r '.id')

          echo "PIXEL_LINK=https://pixeldrain.com/u/$ID" >> $GITHUB_ENV
          echo "PIXEL_BYPASS=https://cdn.pixeldrain.eu.cc/$ID" >> $GITHUB_ENV

      - name: Upload Gofile
        if: ${{ github.event.inputs.UPLOAD_GOFILE == 'true' }}
        continue-on-error: true
        run: |
          RES=$(curl -s \
            -H "Authorization: Bearer ${{ secrets.GOFILE_TOKEN }}" \
            -F "file=@${ROM_OUTPUT}" \
            https://upload.gofile.io/uploadfile)

          LINK=$(echo "$RES" | jq -r '.data.downloadPage')
          echo "GOFILE_LINK=$LINK" >> $GITHUB_ENV

      - name: Upload SourceForge
        if: ${{ github.event.inputs.UPLOAD_SF == 'true' }}
        continue-on-error: true
        run: |
          echo "${{ secrets.SF_SSH_KEY_2 }}" > key
          chmod 600 key

          DEST="/home/frs/project/zkosfork/ROM/"
          ssh -i key -o StrictHostKeyChecking=no hzzmonet@frs.sourceforge.net "mkdir -p $DEST"

          rsync -avP -e "ssh -i key -o StrictHostKeyChecking=no" \
            "$ROM_OUTPUT" \
            "hzzmonet@frs.sourceforge.net:$DEST"

          echo "SF_LINK=https://sourceforge.net/projects/zkosfork/files/ROM/$(basename "$ROM_OUTPUT")/download" >> $GITHUB_ENV

      - name: Upload Google Drive
        if: ${{ github.event.inputs.UPLOAD_GDRIVE == 'true' }}
        continue-on-error: true
        run: |
          mkdir -p ~/.config/rclone
          echo '${{ secrets.GDRIVE_SERVICE_ACCOUNT_JSON }}' > ~/.config/rclone/sa.json

          cat > ~/.config/rclone/rclone.conf <<EOF
          [gdrive]
          type = drive
          scope = drive
          service_account_file = ~/.config/rclone/sa.json
          root_folder_id = ${{ secrets.GDRIVE_FOLDER_ID }}
          EOF

          rclone copy "$ROM_OUTPUT" gdrive:

      - name: Telegram
        if: always()
        run: |
          FILE=$(basename "${ROM_OUTPUT:-unknown}")

          if [ "$BUILD_STATUS" = "failed" ]; then
            TEXT="❌ Build FAILED%0AFile: $FILE"
          else
            TEXT="📦 New Build%0AFile: $FILE"
          fi

          KB=$(jq -n '[]')

          add() {
            KB=$(echo "$KB" | jq --arg t "$1" --arg u "$2" '. += [[{"text":$t,"url":$u}]]')
          }

          [ -n "$PIXEL_LINK" ] && add "Pixeldrain" "$PIXEL_LINK"
          [ -n "$PIXEL_BYPASS" ] && add "Bypass" "$PIXEL_BYPASS"
          [ -n "$GOFILE_LINK" ] && add "Gofile" "$GOFILE_LINK"
          [ -n "$SF_LINK" ] && add "SourceForge" "$SF_LINK"

          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_TOKEN }}/sendMessage" \
            -H "Content-Type: application/json" \
            -d "$(jq -n \
              --arg chat "${{ secrets.TELEGRAM_TO }}" \
              --arg text "$TEXT" \
              --argjson kb "$KB" \
              '{chat_id:$chat,text:$text,parse_mode:"HTML",reply_markup:{inline_keyboard:$kb}}')"

      - name: Cleanup
        if: always()
        run: rm -rf builder key
